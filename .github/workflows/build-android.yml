name: Build Android APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      ANDROID_HOME: ${{ github.workspace }}/android-sdk
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

    steps:
      # -----------------------------
      # Checkout repository
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Install dependencies
      # -----------------------------
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk wget unzip

      # -----------------------------
      # Setup Android SDK
      # -----------------------------
      - name: Setup Android SDK
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          rm cmdline-tools.zip
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      # -----------------------------
      # Install Godot
      # -----------------------------
      - name: Setup Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip -O godot.zip
          unzip -q godot.zip
          sudo mv Godot_v4.3-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          rm godot.zip

      # -----------------------------
      # Install Export Templates
      # -----------------------------
      - name: Setup Export Templates
        run: |
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/4.3.stable"
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz -O templates.tpz
          unzip -q templates.tpz -d templates_tmp
          mkdir -p "$TEMPLATE_DIR"
          mv templates_tmp/templates/* "$TEMPLATE_DIR/"
          rm -rf templates_tmp templates.tpz

      # -----------------------------
      # Generate Project (روٹ میں)
      # -----------------------------
      - name: Generate Mock Project
        run: |
          # پہلے tests/ میں جائیں، پھر واپس
          cd tests
          python generate_ci_project.py
          cd ..
          
          # فائلیں tests/ سے روٹ میں منتقل کریں
          mv tests/generated_games .
          
          # چیک کریں
          echo "=== Files in generated_games/ ==="
          ls -la generated_games/
          
          echo "=== export_presets.cfg ==="
          cat generated_games/export_presets.cfg

      # -----------------------------
      # Create Debug Keystore
      # -----------------------------
      - name: Create Debug Keystore
        run: |
          keytool -genkey -v \
            -keystore generated_games/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          
          ls -la generated_games/

      # -----------------------------
      # Export APK
      # -----------------------------
      - name: Export APK
        run: |
          godot --headless --verbose --path generated_games --export-debug "Android" build.apk

      # -----------------------------
      # Upload APK
      # -----------------------------
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build.apk
          path: build.apk
