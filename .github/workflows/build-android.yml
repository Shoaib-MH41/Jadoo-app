name: Build Android APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      ANDROID_HOME: ${{ github.workspace }}/android-sdk
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

    steps:
      # -----------------------------
      # Checkout repository
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Install dependencies
      # -----------------------------
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk wget unzip

      # -----------------------------
      # Setup Android SDK
      # -----------------------------
      - name: Setup Android SDK
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          rm cmdline-tools.zip
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      # -----------------------------
      # Install Godot
      # -----------------------------
      - name: Setup Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip -O godot.zip
          unzip -q godot.zip
          sudo mv Godot_v4.3-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          rm godot.zip

      # -----------------------------
      # Install Export Templates
      # -----------------------------
      - name: Setup Export Templates
        run: |
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/4.3.stable"
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz -O templates.tpz
          unzip -q templates.tpz -d templates_tmp
          mkdir -p "$TEMPLATE_DIR"
          mv templates_tmp/templates/* "$TEMPLATE_DIR/"
          rm -rf templates_tmp templates.tpz

      # -----------------------------
      # Generate Project
      # -----------------------------
      - name: Generate Mock Project
        run: |
          # پرانی فولڈر صاف کریں
          rm -rf generated_games tests/generated_games
          
          # بنائیں
          cd tests
          python generate_ci_project.py
          cd ..
          
          # منتقل کریں
          mv tests/generated_games .
          
          # چیک کریں
          echo "=== Files in generated_games/ ==="
          ls -la generated_games/
          
          echo "=== export_presets.cfg ==="
          cat generated_games/export_presets.cfg | head -20

      # -----------------------------
      # Configure Godot Editor Settings
      # -----------------------------
      - name: Configure Godot Editor Settings
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres << EOF
[gd_resource type="EditorSettings" format=3]

[resource]
export/android/android_sdk_path = "$ANDROID_HOME"
export/android/debug_keystore = "$GITHUB_WORKSPACE/generated_games/debug.keystore"
export/android/debug_keystore_user = "androiddebugkey"
export/android/debug_keystore_pass = "android"
EOF
          echo "=== Editor settings ==="
          cat ~/.config/godot/editor_settings-4.tres

      # -----------------------------
      # Export APK
      # -----------------------------
      - name: Export APK
        run: |
          cd generated_games
          godot --headless --verbose --export-debug "Android" ../build.apk

      # -----------------------------
      # Upload APK
      # -----------------------------
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build.apk
          path: build.apk
          if-no-files-found: error
