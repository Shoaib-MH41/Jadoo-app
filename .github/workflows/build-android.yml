name: Build Android APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: ${{ github.workspace }}/android-sdk
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk wget unzip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Android SDK
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          rm cmdline-tools.zip
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip -O godot.zip
          unzip -q godot.zip
          sudo mv Godot_v4.3-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          rm godot.zip

      - name: Setup Export Templates
        run: |
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/4.3.stable"
          mkdir -p "$TEMPLATE_DIR"
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz -O templates.tpz
          unzip -q templates.tpz -d templates_tmp
          mv templates_tmp/templates/* "$TEMPLATE_DIR/"
          rm -rf templates_tmp templates.tpz

      - name: Generate Mock Project
        run: |
          python tests/generate_ci_project.py
          # Export Preset کو پروجیکٹ میں کاپی کریں
          cp export_presets.cfg generated_games/

      - name: Configure Godot Android SDK
        run: |
          mkdir -p ~/.config/godot
          # ڈیبگ کی اسٹور جنریٹ کریں
          keytool -genkey -v -keystore $GITHUB_WORKSPACE/generated_games/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=US"
          
          cat <<EOF > ~/.config/godot/editor_settings-4.tres
          [android]
          sdk_path="$ANDROID_HOME"
          adb_path="$ANDROID_HOME/platform-tools/adb"
          jarsigner_path="$JAVA_HOME/bin/jarsigner"
          debug_keystore="$GITHUB_WORKSPACE/generated_games/debug.keystore"
          debug_keystore_user="androiddebugkey"
          debug_keystore_pass="android"
          EOF

      - name: Export APK
        run: |
          # پروجیکٹ ڈائریکٹری میں APK بنائیں
          godot --headless --verbose --path generated_games --export-debug "Android" generated_games/build.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mock-Game-APK
          path: generated_games/build.apk
