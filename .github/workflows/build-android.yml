name: Build Android APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      ANDROID_HOME: ${{ github.workspace }}/android-sdk
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk wget unzip

      - name: Setup Android SDK
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-14742923_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          rm cmdline-tools.zip
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip -O godot.zip
          unzip -q godot.zip
          sudo mv Godot_v4.3-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          rm godot.zip

      - name: Setup Export Templates
        run: |
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/4.3.stable"
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz -O templates.tpz
          unzip -q templates.tpz -d templates_tmp
          mkdir -p "$TEMPLATE_DIR"
          mv templates_tmp/templates/* "$TEMPLATE_DIR/"
          rm -rf templates_tmp templates.tpz

      - name: Generate Mock Project
        run: |
          rm -rf generated_games tests/generated_games
          cd tests
          python generate_ci_project.py
          cd ..
          mv tests/generated_games .
          ls -la generated_games/

      - name: Prepare Project Files
        run: |
          # ایکسپورٹ پری سیٹ فائل کو جنریٹڈ گیمز فولڈر میں کاپی کرنا
          cp export_presets.cfg generated_games/ || true
          # چیک کریں کہ کیا project.godot فائل موجود ہے
          ls -la generated_games/

      - name: Generate Debug Keystore
        run: |
          rm -f generated_games/debug.keystore
          keytool -keyalg RSA -genkey -v -keystore generated_games/debug.keystore -alias androiddebugkey -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US" -validity 365

      - name: Configure Godot Editor Settings
        run: |
          mkdir -p ~/.config/godot
          echo '[gd_resource type="EditorSettings" format=3]' > ~/.config/godot/editor_settings-4.tres
          echo '' >> ~/.config/godot/editor_settings-4.tres
          echo '[resource]' >> ~/.config/godot/editor_settings-4.tres
          echo "export/android/android_sdk_path = \"$ANDROID_HOME\"" >> ~/.config/godot/editor_settings-4.tres
          echo "export/android/debug_keystore = \"$GITHUB_WORKSPACE/generated_games/debug.keystore\"" >> ~/.config/godot/editor_settings-4.tres
          echo 'export/android/debug_keystore_user = "androiddebugkey"' >> >> ~/.config/godot/editor_settings-4.tres
          echo 'export/android/debug_keystore_pass = "android"' >> ~/.config/godot/editor_settings-4.tres

      - name: Import and Export APK
        run: |
          cd generated_games
          # مرحلہ 1: پروجیکٹ کو امپورٹ کریں (یہ سب سے اہم ہے)
          godot --headless --editor --quit --verbose
          # مرحلہ 2: اب ایکسپورٹ کریں
          godot --headless --verbose --export-debug "Android" ../build.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build_apk_file
          path: build.apk
          if-no-files-found: error
